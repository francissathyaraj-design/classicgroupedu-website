<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classic Paramedical College</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
    text-align: center;
}

/* Center content */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* LOGO WHITE LABEL */
.logo-box {
    display: inline-block;
    background: white;
    padding: 8px 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.logo {
    width: 120px;
    height: auto;
}

/* Text */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.highlight {
    color: #00e5ff;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}

p {
    margin: 6px 0;
    font-size: 16px;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    background: #00c6d7;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.btn:hover {
    background: #00a5b5;
}
</style>

</head>

<body>

<div class="container">

    <!-- Logo with white label -->
    <div class="logo-box">
        <img src="logo.png" class="logo">
    </div>

    <h1>Classic Paramedical College</h1>

    <div class="highlight">Admissions Open 2026</div>

    <p>🚧 Website Coming Soon 🚧</p>
    <p>📞 Contact: 95145 50520</p>
    <p>🌐 classicgroupedu.in</p>

    <a href="tel:9514550520" class="btn">Call Now</a>

</div>

</body>
</html>
