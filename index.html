<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classic Paramedical College</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Card */
.container {
    background: white;
    padding: 40px 20px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 600px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Logo */
.logo-box {
    margin-bottom: 20px;
}

.logo {
    width: 120px;
    height: auto;
}

/* Text */
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.highlight {
    color: #00bcd4;
    font-weight: bold;
    margin-bottom: 15px;
}

p {
    margin: 8px 0;
    font-size: 16px;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00bcd4;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    display: inline-block;
    font-weight: bold;
}

.btn:hover {
    background: #0097a7;
}
</style>

</head>

<body>

<div class="container">

    <!-- Logo -->
    <div class="logo-box">
        <img src="logo.png" class="logo">
    </div>

    <!-- Content -->
    <h1>Classic Paramedical College</h1>

    <div class="highlight">Admissions Open 2026</div>

    <p>🚧 Website Coming Soon 🚧</p>
    <p>📞 Contact: 95145 50520</p>
    <p>🌐 classicgroupedu.in</p>

    <!-- Button -->
    <a href="tel:9514550520" class="btn">Call Now</a>

</div>

</body>
</html>
